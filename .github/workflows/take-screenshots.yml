name: Take M365 Screenshots

on:
  schedule:
    - cron: '0 8 * * 1'   # Ukentlig — mandag kl. 08:00 UTC
  workflow_dispatch:
    inputs:
      guide_id:
        description: 'Guide ID å kjøre (tom = alle)'
        required: false
        default: ''

jobs:
  take-screenshots:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Install Python + Tesseract (for redact.py)
        run: |
          sudo apt-get install -y tesseract-ocr --quiet
          pip install pillow pytesseract --break-system-packages --quiet

      - name: Create required directories
        run: |
          mkdir -p public/screenshots
          mkdir -p data

      - name: Take screenshots
        env:
          M365_EMAIL: ${{ secrets.M365_EMAIL }}
          M365_PASSWORD: ${{ secrets.M365_PASSWORD }}
          M365_CLIENT_ID: ${{ secrets.M365_CLIENT_ID }}
          M365_TENANT_ID: ${{ secrets.M365_TENANT_ID }}
          M365_CLIENT_SECRET: ${{ secrets.M365_CLIENT_SECRET }}
          GUIDE_ID: ${{ github.event.inputs.guide_id }}
        run: node scripts/take-screenshots.js

      - name: Redact tenant data from screenshots
        env:
          M365_EMAIL: ${{ secrets.M365_EMAIL }}
          M365_TENANT_DOMAIN: ${{ secrets.M365_TENANT_DOMAIN }}
        run: python3 scripts/redact.py

      - name: Commit debug screenshots on failure
        if: failure()
        run: |
          git config user.name "GuideHub365 Bot"
          git config user.email "bot@guidehub365.com"
          git add -f public/screenshots/_debug-*.png 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Debug: login screenshots $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin main
          git push origin main || true

      - name: Check for new screenshots
        id: diff
        run: |
          git add -A public/screenshots/ data/screenshot-registry.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push screenshots
        if: steps.diff.outputs.has_changes == 'true'
        run: |
          git config user.name "GuideHub365 Bot"
          git config user.email "bot@guidehub365.com"
          git commit -m "🤖 Auto: Oppdatert skjermbilder $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push origin main
